<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Shopkeeper Login</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    height: 100vh;
    background: url('backgroundss.jpg') no-repeat center center/cover;

    display: flex;
    justify-content: center;
    align-items: center;
}

/* overlay */
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    top: 0;
    left: 0;
    z-index: 0;
}

.container {
    position: relative;
    z-index: 1;

    display: flex;
    width: 850px;
    height: 450px;

    border-radius: 20px;
    overflow: hidden;

    box-shadow: 0 10px 30px rgba(0,0,0,0.5);

    transition: transform 0.3s ease;
}

/* 🔥 CARD HOVER */
.container:hover {
    transform: scale(1.02);
}

/* LEFT IMAGE */
.left {
    width: 50%;
    position: relative;
    overflow: hidden;
}

.left img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.5s ease;
}

/* 🔥 IMAGE HOVER ZOOM */
.left:hover img {
    transform: scale(1.1);
}

/* TEXT ON IMAGE */
.overlay-text {
    position: absolute;
    bottom: 20px;
    left: 20px;
    color: white;
}

/* RIGHT LOGIN */
.right {
    width: 50%;
    background: rgba(255,255,255,0.95);
    padding: 40px;

    display: flex;
    flex-direction: column;
    justify-content: center;
}

.right h2 {
    margin-bottom: 20px;
}

/* INPUTS */
.input-box {
    margin-bottom: 15px;
}

.input-box input {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #ccc;
    transition: all 0.3s ease;
}

/* 🔥 INPUT HOVER + FOCUS */
.input-box input:hover {
    border-color: #6a11cb;
}

.input-box input:focus {
    border-color: #2575fc;
    box-shadow: 0 0 5px rgba(37,117,252,0.5);
}

/* BUTTON */
.btn {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(to right, #6a11cb, #2575fc);
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: all 0.3s ease;
}

/* 🔥 BUTTON HOVER */
.btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

/* LINKS */
.links {
    display: flex;
    justify-content: space-between;
    margin-top: 10px;
}

.links a {
    text-decoration: none;
    color: #6a11cb;
    transition: 0.3s;
}

/* 🔥 LINK HOVER */
.links a:hover {
    color: #2575fc;
    text-decoration: underline;
}

</style>
</head>

<body>

<div class="container">

    <!-- LEFT -->
    <div class="left">
        <img src="smart-shopkeeper.webp">

        <div class="overlay-text">
            <h1>Smart Shopkeeper</h1>
            <p>Simplified Billing System</p>
        </div>
    </div>

    <!-- RIGHT -->
    <div class="right">
        <h2>🔐 Login</h2>

        <form method="POST" action="/login">
            <div class="input-box">
                <input type="text" name="username" placeholder="Username" required>
            </div>

            <div class="input-box">
                <input type="password" name="password" placeholder="Password" required>
            </div>

            <button type="submit" class="btn">Login</button>
        </form>

        <div class="links">
            <a href="/register">📝 Create New Account</a>
        </div>
    </div>

</div>

</body>
</html>
