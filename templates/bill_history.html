<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bill History</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html {
    scroll-behavior: smooth;
}

body {
    display: flex;
    background: #f5f7fa;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', sans-serif;
    color: #2c3e50;
    min-height: 100vh;
}

.sidebar {
    width: 260px;
    background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
    color: white;
    min-height: 100vh;
    padding: 30px 20px;
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    overflow-y: auto;
}

.profile {
    text-align: center;
    margin-bottom: 40px;
    padding-bottom: 30px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.15);
}

.profile img {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    border: 4px solid rgba(255, 255, 255, 0.3);
    margin-bottom: 15px;
    object-fit: cover;
    transition: transform 0.3s ease;
}

.profile img:hover {
    transform: scale(1.05);
}

.profile h3 {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0.5px;
}

.menu a {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    color: rgba(255, 255, 255, 0.85);
    text-decoration: none;
    margin: 8px 0;
    border-radius: 8px;
    transition: all 0.3s ease;
    font-size: 14px;
    font-weight: 500;
}

.menu a:hover {
    background: rgba(255, 255, 255, 0.15);
    color: white;
    transform: translateX(5px);
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
}

.main {
    flex: 1;
    padding: 40px;
    overflow-y: auto;
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 40px;
}

.header h2 {
    font-size: 28px;
    font-weight: 700;
    color: #2c3e50;
    letter-spacing: -0.5px;
}

.back-btn {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    padding: 10px 24px;
    border-radius: 8px;
    text-decoration: none;
    font-weight: 600;
    font-size: 14px;
    transition: all 0.3s ease;
    border: none;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(102, 126, 234, 0.3);
}

.back-btn:hover {
    background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
}

.card {
    background: white;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
}

table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
}

thead {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
}

th {
    padding: 16px;
    text-align: left;
    color: white;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
}

td {
    padding: 14px 16px;
    border-bottom: 1px solid #e0e0e0;
    font-size: 14px;
    color: #2c3e50;
}

tbody tr:hover {
    background: #f5f7fa;
}

.btn {
    padding: 8px 16px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: 600;
    font-size: 13px;
    transition: all 0.3s ease;
    margin: 0 4px;
}

.btn-view {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
}

.btn-view:hover {
    transform: translateY(-2px);
}

.btn-delete {
    background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
    color: white;
}

.btn-delete:hover {
    transform: translateY(-2px);
}

.empty-state {
    text-align: center;
    padding: 60px 20px;
    color: #95a5a6;
}

.modal {
    display: none;
    position: fixed;
    z-index: 1000;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.5);
}

.modal.active {
    display: flex;
    align-items: center;
    justify-content: center;
}

.modal-content {
    background: white;
    padding: 30px;
    border-radius: 12px;
    width: 90%;
    max-width: 600px;
    max-height: 80vh;
    overflow-y: auto;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
}

.modal-header {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 20px;
    border-bottom: 2px solid #e0e0e0;
    padding-bottom: 15px;
}

.modal-item {
    padding: 12px 0;
    border-bottom: 1px solid #e0e0e0;
    display: flex;
    justify-content: space-between;
}

.modal-total {
    margin-top: 20px;
    font-weight: 700;
    font-size: 18px;
    text-align: right;
    color: #667eea;
}

.close-btn {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
    margin-top: 20px;
    float: right;
}

@media (max-width: 768px) {
    body {
        flex-direction: column;
    }
    .sidebar {
        width: 100%;
    }
    .main {
        padding: 20px;
    }
}
</style>
</head>

<body>

<div class="sidebar">
    <div class="profile">
        <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="Admin">
        <h3>Smart Shopkeeper</h3>
    </div>
    <div class="menu">
        <a href="/dashboard">🏠 Dashboard</a>
        <a href="/add_product">➕ Add Product</a>
        <a href="/view_products">📦 View Products</a>
        <a href="/billing">💳 Billing</a>
        <a href="/bill_history">🧾 Bill History</a>
        <a href="/stock_report">📊 Stock Report</a>
    </div>
</div>

<div class="main">
<div class="header">
    <h2>🧾 Bill History</h2>
    <a href="/dashboard" class="back-btn">← Back</a>
</div>
<div class="card">
    <table>
        <thead>
            <tr>
                <th>Bill ID</th>
                <th>Date</th>
                <th>Items</th>
                <th>Subtotal</th>
                <th>GST</th>
                <th>Total</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="billTable"></tbody>
    </table>
    <div id="emptyState" class="empty-state">
        <h3>📦 No Bills Yet</h3>
        <p>Create your first bill in the Billing section!</p>
    </div>
</div>
</div>

<div id="billModal" class="modal">
    <div class="modal-content">
        <div class="modal-header" id="modalHeader">Bill Details</div>
        <div id="modalBody"></div>
        <button class="close-btn" onclick="closeBillModal()">Close</button>
    </div>
</div>

<script>
function loadBillHistory() {
    let bills = JSON.parse(localStorage.getItem("billHistory")) || [];
    let table = document.getElementById("billTable");
    table.innerHTML = "";
    if (bills.length === 0) {
        document.getElementById("emptyState").style.display = "block";
        return;
    }
    document.getElementById("emptyState").style.display = "none";
    bills.slice().reverse().forEach(bill => {
        table.innerHTML += `<tr><td>#${bill.id}</td><td>${bill.date}</td><td>${bill.items.length}</td><td>₹${bill.subtotal.toFixed(2)}</td><td>₹${bill.gst.toFixed(2)}</td><td>₹${bill.total.toFixed(2)}</td><td><button class="btn btn-view" onclick="viewBill(${bill.id})">👁️ View</button><button class="btn btn-delete" onclick="deleteBill(${bill.id})">🗑️ Delete</button></td></tr>`;
    });
}
function viewBill(id) {
    let bills = JSON.parse(localStorage.getItem("billHistory")) || [];
    let bill = bills.find(b => b.id === id);
    if (!bill) return;
    let html = bill.items.map(i => `<div class="modal-item"><span>${i.name}</span><span>₹${(i.price * i.qty).toFixed(2)}</span></div>`).join('');
    html += `<div class="modal-item"><span><strong>Subtotal</strong></span><span>₹${bill.subtotal.toFixed(2)}</span></div><div class="modal-item"><span><strong>GST</strong></span><span>₹${bill.gst.toFixed(2)}</span></div><div class="modal-item"><span><strong>Discount</strong></span><span>-₹${bill.discount.toFixed(2)}</span></div><div class="modal-total">Total: ₹${bill.total.toFixed(2)}</div>`;
    document.getElementById("modalHeader").innerHTML = `Bill #${bill.id}`;
    document.getElementById("modalBody").innerHTML = html;
    document.getElementById("billModal").classList.add("active");
}
function closeBillModal() {
    document.getElementById("billModal").classList.remove("active");
}
function deleteBill(id) {
    if (confirm("Delete this bill?")) {
        fetch(`/delete_bill/${id}`, {
            method: 'DELETE'
        })
        .then(res => res.json())
        .then(data => {
            if (data.success) {
                alert("✅ Deleted!");
                loadBillHistory();
            } else {
                alert("❌ Error deleting bill");
            }
        })
        .catch(err => alert("❌ Error: " + err));
    }
}
window.onclick = function(e) {
    let modal = document.getElementById("billModal");
    if (e.target === modal) modal.classList.remove("active");
}
loadBillHistory();
</script>
</body>
</html>
