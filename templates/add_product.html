<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Add Product</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html {
    scroll-behavior: smooth;
}

/* LAYOUT */
body {
    display: flex;
    background: #f5f7fa;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', sans-serif;
    color: #2c3e50;
    min-height: 100vh;
}

/* SIDEBAR */
.sidebar {
    width: 260px;
    background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
    color: white;
    min-height: 100vh;
    padding: 30px 20px;
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    overflow-y: auto;
}

.profile {
    text-align: center;
    margin-bottom: 40px;
    padding-bottom: 30px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.15);
}

.profile img {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    border: 4px solid rgba(255, 255, 255, 0.3);
    margin-bottom: 15px;
    object-fit: cover;
    transition: transform 0.3s ease;
}

.profile img:hover {
    transform: scale(1.05);
}

.profile h3 {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0.5px;
}

.menu a {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    color: rgba(255, 255, 255, 0.85);
    text-decoration: none;
    margin: 8px 0;
    border-radius: 8px;
    transition: all 0.3s ease;
    font-size: 14px;
    font-weight: 500;
}

.menu a:hover {
    background: rgba(255, 255, 255, 0.15);
    color: white;
    transform: translateX(5px);
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
}

/* MAIN */
.main {
    flex: 1;
    padding: 40px;
    overflow-y: auto;
}

/* HEADER */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 40px;
}

.header h2 {
    font-size: 28px;
    font-weight: 700;
    color: #2c3e50;
    letter-spacing: -0.5px;
}

/* BACK BUTTON */
.back-btn {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    padding: 10px 24px;
    border-radius: 8px;
    text-decoration: none;
    font-weight: 600;
    font-size: 14px;
    transition: all 0.3s ease;
    border: none;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(102, 126, 234, 0.3);
}

.back-btn:hover {
    background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
}

/* CONTAINER */
.container {
    display: grid;
    grid-template-columns: 1fr;
    gap: 30px;
}

/* RIGHT */
.right {
    background: white;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    transition: all 0.3s ease;
}

.right:hover {
    box-shadow: 0 8px 16px rgba(0, 0, 0, 0.12);
}

/* INPUT */
.input-box {
    margin-bottom: 25px;
}

.input-box label {
    display: block;
    font-weight: 700;
    color: #2c3e50;
    margin-bottom: 8px;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.input-box input,
.input-box select,
.input-box textarea {
    width: 100%;
    padding: 12px 16px;
    border: 2px solid #e0e0e0;
    border-radius: 8px;
    font-size: 14px;
    transition: all 0.3s ease;
    background: #f9f9f9;
    font-family: inherit;
    color: #2c3e50;
}

.input-box input:focus,
.input-box select:focus,
.input-box textarea:focus {
    outline: none;
    border-color: #667eea;
    background: white;
    box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
}

.input-box textarea {
    resize: vertical;
    min-height: 100px;
}

/* BUTTON */
.btn {
    width: 100%;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    padding: 14px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 700;
    font-size: 15px;
    transition: all 0.3s ease;
    box-shadow: 0 2px 8px rgba(102, 126, 234, 0.3);
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.btn:hover {
    background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
}

.btn:active {
    transform: translateY(0);
}

/* Scrollbar */
::-webkit-scrollbar {
    width: 8px;
}

::-webkit-scrollbar-track {
    background: #f1f1f1;
}

::-webkit-scrollbar-thumb {
    background: #888;
    border-radius: 4px;
}

::-webkit-scrollbar-thumb:hover {
    background: #555;
}

/* Responsive */
@media (max-width: 1024px) {
    .main {
        padding: 25px;
    }

    .container {
        grid-template-columns: 1fr;
        gap: 20px;
    }
}

@media (max-width: 768px) {
    body {
        flex-direction: column;
    }

    .sidebar {
        width: 100%;
        min-height: auto;
        padding: 20px;
    }

    .main {
        padding: 20px;
    }

    .header {
        flex-direction: column;
        align-items: flex-start;
        gap: 15px;
    }

    .header h2 {
        font-size: 24px;
    }
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="profile">
        <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="Admin Profile">
        <h3>Smart Shopkeeper</h3>
    </div>

    <div class="menu">
        <a href="dashboard.html">🏠 Dashboard</a>
        <a href="add_product.html">➕ Add Product</a>
        <a href="view_products.html">📦 View Products</a>
        <a href="billing.html">💳 Billing</a>
        <a href="bill_history.html">🧾 Bill History</a>
        <a href="stock_report.html">📊 Stock Report</a>
    </div>
</div>

<!-- MAIN -->
<div class="main">

<div class="header">
    <h2>➕ Add Product</h2>
    <a href="dashboard.html" class="back-btn">← Back to Dashboard</a>
</div>

<div class="container">

<!-- FORM -->
<div class="right">

<div class="input-box">
    <label>Product Name</label>
    <input type="text" id="name">
</div>

<div class="input-box">
    <label>Category</label>
    <select id="category">
        <option>Select Category</option>
        <option>Groceries</option>
        <option>Dairy & Milk</option>
        <option>Beverages</option>
        <option>Snacks</option>
        <option>Personal Care</option>
        <option>Household Items</option>
        <option>Cleaning Supplies</option>
    </select>
</div>

<div class="input-box">
    <label>Quantity</label>
    <input type="number" id="qty">
</div>

<div class="input-box">
    <label>Price</label>
    <input type="number" id="price">
</div>

<div class="input-box">
    <label>Description</label>
    <textarea id="description"></textarea>
</div>

<button class="btn" onclick="saveProduct()">✅ Publish Product</button>

</div>

</div>

</div>

<!-- JS -->
<script>

/* SAVE PRODUCT */
function saveProduct() {

    let name = document.getElementById("name").value;
    let category = document.getElementById("category").value;
    let quantity = document.getElementById("qty").value;
    let price = document.getElementById("price").value;
    let description = document.getElementById("description").value;

    if (!name || !quantity || !price) {
        alert("Fill all fields ❌");
        return;
    }

    // Send data to server
    fetch('/add_product', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({
            name: name,
            category: category,
            quantity: quantity,
            price: price,
            description: description
        })
    })
    .then(response => {
        console.log('Response status:', response.status);
        return response.json();
    })
    .then(data => {
        console.log('Response data:', data);
        if (data.success) {
            // Show success notification
            showNotification("✅ " + data.message, "Product: " + data.productName);
            
            // Clear form
            document.getElementById("name").value = "";
            document.getElementById("category").value = "Select Category";
            document.getElementById("qty").value = "";
            document.getElementById("price").value = "";
            document.getElementById("description").value = "";
            
            // Redirect after 2 seconds
            setTimeout(() => {
                window.location.href = "/view_products";
            }, 2000);
        } else {
            alert("Error: " + (data.error || "Failed to add product"));
        }
    })
    .catch(error => {
        console.error('Error:', error);
        alert("Error adding product! ❌");
    });
}

/* SHOW NOTIFICATION */
function showNotification(message, details) {
    let notif = document.createElement("div");
    notif.style.cssText = `
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: white;
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        text-align: center;
        z-index: 9999;
        min-width: 350px;
    `;
    
    notif.innerHTML = `
        <h3 style="color: #2c3e50; margin: 0 0 15px 0; font-size: 18px;">${message}</h3>
        <p style="color: #666; margin: 0; font-size: 14px;">${details}</p>
    `;
    
    document.body.appendChild(notif);
}

</script>

</body>
</html>
